version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: interview-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interview_prep

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: interview_prep
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CHROMA_PERSIST_DIR: /data/chroma_db
    volumes:
      - chroma_data:/data/chroma_db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: interview-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      API_BASE: http://backend:8000
    volumes:
      - ./frontend:/app/frontend

volumes:
  mongo_data:
  chroma_data:
